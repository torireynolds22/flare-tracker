                            <span style={{ fontSize: 9, fontWeight: 700, color: isDone ? "#16a34a" : "#d97706", background: isDone ? "#dcfce7" : "#fef9c3", padding: "2px 8px", borderRadius: 99, textTransform: "uppercase", letterSpacing: 0.6 }}>{o.status}</span>

              ? totalReceived - currentBalance
              : (currentBalance !== null ? allocated - currentBalance : spent);

                        <div style={{ flex: 1, minWidth: 200 }}>

                            <span style={{ fontSize: 16, color: "#6b7280", fontWeight: 700 }}>$</span>
                            <input
                              type="number"
                              defaultValue={currentBalance ?? ""}
                              placeholder="e.g. 1040"
                              id={"balance-input-" + p.id}
                              style={{ flex: 1, padding: "10px 14px", border: "1.5px solid #dde1e9", borderRadius: 3, fontSize: 16, outline: "none", fontFamily: "inherit", fontWeight: 700 }}

                              const val = parseFloat(document.getElementById("balance-input-" + p.id)?.value);

                              Save Balance
                            </button>
                          </div>
                        </div>
                        {currentBalance !== null && (
                          <div style={{ padding: "12px 16px", background: currentBalance < 1000 ? "#fef2f2" : currentBalance < 10000 ? "#fef9c3" : "#f0fdf4", borderRadius: 3, border: `1px solid ${currentBalance < 1000 ? "#fca5a5" : currentBalance < 10000 ? "#fde68a" : "#86efac"}`, minWidth: 180 }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: currentBalance < 1000 ? "#dc2626" : currentBalance < 10000 ? "#d97706" : "#16a34a", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>
                              {currentBalance < 1000 ? "⚠ Very Low Balance" : currentBalance < 10000 ? "⚠ Low Balance" : "✓ Healthy Balance"}
                            </div>
                            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 26, fontWeight: 900, color: currentBalance < 1000 ? "#dc2626" : currentBalance < 10000 ? "#d97706" : "#16a34a" }}>
                              ${currentBalance.toLocaleString()}
                            </div>
                            {totalReceived > 0 && <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 2 }}>≈ ${Math.round(effectiveSpent).toLocaleString()} spent so far</div>}
                          </div>
                        )}
                      </div>
                    </div>

                    {/* Burn rate */}
                    <div style={{ background: "#fff", borderRadius: 3, padding: "18px 20px", marginBottom: 20, border: "1px solid #e2e5ea" }}>
                      <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 15, textTransform: "uppercase", letterSpacing: 0.8, color: "#0f1f3d", marginBottom: 14 }}>Budget Burn vs Progress</div>
                      {[
                        { label: "Spent", pct: effectiveBurn, color: effectiveBurn > progressPct + 15 ? "#dc2626" : "#e85d27" },
                        { label: "Received", pct: allocated > 0 ? (totalReceived / allocated) * 100 : 0, color: "#16a34a" },
                        { label: "Progress", pct: progressPct, color: "#2563eb" },

                            <span>{b.label}</span><span style={{ color: b.color, fontWeight: 700 }}>{b.pct.toFixed(0)}%</span>

                      )}

                    {/* Payment milestones */}

                  </div>
                )}
              </div>
            );
          })()}

                    {activeSection === "notes" && (

                    <Icon name="plus" size={14} color={!newNote.trim() ? "#9ca3af" : "#fff"} />
                    {savingNote ? "Saving…" : "Add Entry"}

                </div>
              </div>

              {/* Notes list */}
              {notes.length === 0
                ? <div style={{ background: "#fff", borderRadius: 3, padding: "40px 22px", textAlign: "center", border: "1px solid #e2e5ea", color: "#9ca3af" }}>
                    <Icon name="info" size={36} color="#dde1e9" style={{ margin: "0 auto 10px", display: "block" }} />
                    <div style={{ fontSize: 14, fontWeight: 600 }}>No entries yet</div>
                    <div style={{ fontSize: 13, marginTop: 4 }}>Add the first update above</div>
                  </div>
                : notes.map(n => {
                    const author = people.find(pe => pe.name === n.author);
                    const primaryRole = author ? (Array.isArray(author.roles) ? author.roles[0] : author.role || "") : "";
                    const rc = ROLE_COLORS[primaryRole] || "#6b7280";
                    return (
                      <div key={n.id} style={{ background: "#fff", borderRadius: 3, padding: "16px 20px", marginBottom: 12, border: "1px solid #e2e5ea", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", display: "flex", gap: 14 }}>

                            <button onClick={() => deleteNote(n.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#d1d5db", padding: "2px", display: "flex" }}>

          )}

            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
                <h2 style={{ margin: 0, fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 24, textTransform: "uppercase", letterSpacing: 0.8, color: "#0f1f3d" }}>Assessments</h2>

              </div>
              <AssessmentBlock type="summary" title="Project Summary" icon="info" placeholder="Write a 3-4 sentence summary of what this project aims to achieve, how it does it, and why it matters…" />
              <AssessmentBlock type="risk" title="Risk Assessment" icon="alert" placeholder="List key risks for this project, e.g.:
• Data availability may delay analysis
• Stakeholder coordination across agencies…" />
              <AssessmentBlock type="for" title="Fields of Research (FoR) Codes" icon="theme" placeholder="List relevant ANZSRC FoR codes, e.g.:
• 0502 Environmental Science and Management
• 0501 Ecological Applications…" />
            </div>
          )}

        {/* ── Right column — Team (always visible) ── */}
        <div style={{ position: "sticky", top: 88 }}>
          {(p.tags?.length > 0) && (

          {allocated > 0 && (

              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontSize: 12, color: "#6b7280" }}>Allocated</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: "#0f1f3d" }}>${allocated.toLocaleString()}</span>

              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                <span style={{ fontSize: 12, color: "#6b7280" }}>Spent</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: "#e85d27" }}>${spent.toLocaleString()}</span>
              </div>
              <div style={{ background: "#f0f2f5", borderRadius: 99, height: 6, overflow: "hidden", marginBottom: 4 }}>
                <div style={{ width: `${burnPct}%`, height: "100%", background: burnPct > 85 ? "#dc2626" : "#e85d27", borderRadius: 99 }} />
              </div>
              <div style={{ fontSize: 11, color: remaining < 0 ? "#dc2626" : "#6b7280", fontWeight: remaining < 0 ? 700 : 400 }}>
                {remaining < 0 ? `$${Math.abs(remaining).toLocaleString()} over budget` : `$${remaining.toLocaleString()} remaining`}

            </div>

          <div style={{ background: "#fff", borderRadius: 3, border: "1px solid #e2e5ea", overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>

              <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 17, textTransform: "uppercase", letterSpacing: 0.8, color: "#0f1f3d" }}>Team Members</span>
              <span style={{ fontSize: 12, color: "#9ca3af", fontWeight: 600 }}>{teamMembers.length}</span>
            </div>
            {teamMembers.length === 0
              ? <div style={{ padding: 20, color: "#9ca3af", fontSize: 14, textAlign: "center" }}>No team members linked</div>
              : teamMembers.map((m, idx) => {
                const role = Array.isArray(m.roles) ? m.roles[0] : (m.role || "");
                const rc = ROLE_COLORS[role] || "#6b7280";
                const isLead = getLeads(p).includes(m.name);
                const themes = (m.themes || []).map(tid => RESEARCH_THEMES.find(t => t.id === tid)).filter(Boolean);
                return (
                  <div key={m.id} style={{ padding: "16px 18px", borderBottom: idx < teamMembers.length - 1 ? "1px solid #f0f2f5" : "none", borderLeft: isLead ? "4px solid #e85d27" : "4px solid transparent" }}>
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 12, marginBottom: themes.length > 0 ? 10 : 0 }}>
                      <div style={{ width: 54, height: 54, borderRadius: "50%", background: rc + "22", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 20, color: rc, flexShrink: 0, overflow: "hidden", border: isLead ? "3px solid #e85d27" : `2px solid ${rc}33`, boxShadow: "0 2px 8px rgba(0,0,0,0.08)" }}>
                        {m.photoUrl ? <img src={m.photoUrl} alt={m.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : m.name.charAt(0)}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 2 }}>
                          <span style={{ fontSize: 14, fontWeight: 700, color: "#0f1f3d" }}>{m.name}</span>
                          {isLead && <span style={{ fontSize: 9, color: "#fff", background: "#e85d27", fontWeight: 800, letterSpacing: 0.8, textTransform: "uppercase", padding: "2px 6px", borderRadius: 2 }}>Lead</span>}
                        </div>
                        <div style={{ fontSize: 12, color: "#6b7280", fontWeight: 500 }}>{role}</div>
                        <div style={{ fontSize: 11, color: "#b0b8c4" }}>{m.email}</div>

                      </div>
                    </div>
                    {themes.length > 0 && (
                      <div style={{ display: "flex", gap: 5, flexWrap: "wrap", paddingLeft: 66 }}>
                        {themes.map(t => <span key={t.id} style={{ fontSize: 10, color: t.color, background: t.color + "15", padding: "3px 8px", borderRadius: 99, fontWeight: 700, border: `1px solid ${t.color}33` }}>{t.label}</span>)}
                      </div>
                    )}
                  </div>
                );
              })
            }
          </div>
        </div>
      </div>
    </div>
  );
}

function PersonProfilePage({ person: p, people, projects, deliverables, onBack, onEdit }) {
  const today = new Date();
  const primaryRole = Array.isArray(p.roles) ? p.roles[0] : (p.role || "");
  const allRoles = Array.isArray(p.roles) ? p.roles : [p.role || ""];
  const rc = ROLE_COLORS[primaryRole] || "#6b7280";
  const themes = (p.themes || []).map(tid => RESEARCH_THEMES.find(t => t.id === tid)).filter(Boolean);

  const myProjects = projects.filter(pr => getLeads(pr).includes(p.name));
  const myDels = deliverables.filter(d => d.assignedTeam === p.name || d.teamLead === p.name);
  const activeDels = myDels.filter(d => d.status !== "Completed");
  const overdueDels = activeDels.filter(d => d.deadline && new Date(d.deadline) < today);
  const upcomingDels = activeDels.filter(d => {
    if (!d.deadline) return false;
    const diff = (new Date(d.deadline) - today) / 86400000;
    return diff >= 0 && diff <= 30;
  });
  const completedDels = myDels.filter(d => d.status === "Completed");

  // All projects they're involved in (led or have deliverables)
  const involvedProjectIds = [...new Set([
    ...myProjects.map(p => p.id),
    ...myDels.map(d => d.project).filter(Boolean)
  ])];
  const involvedProjects = projects.filter(pr => involvedProjectIds.includes(pr.id));

    const now = new Date();
    const start = p.leaveStart ? new Date(p.leaveStart) : null;

    return !(start && now < start) && !(end && now > end);

        <button onClick={() => onEdit(p)} style={{ marginLeft: "auto", padding: "9px 22px", background: "#e85d27", color: "#fff", border: "none", borderRadius: 2, fontSize: 11, fontWeight: 700, cursor: "pointer", letterSpacing: 0.8, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 6 }}>

            <div style={{ padding: "28px 24px", textAlign: "center", borderBottom: "1px solid #f0f2f5" }}>

                const proj = projects.find(pr => pr.id === d.project);

                const isTeamLead = d.teamLead === p.name;

                  <div key={d.id} style={{ padding: "12px 18px", borderBottom: i < g.items.length-1 ? "1px solid #f5f5f5" : "none", display: "flex", alignItems: "flex-start", gap: 12, borderLeft: `3px solid ${isOverdue ? "#ef4444" : {"Completed":"#22c55e","In Progress":"#3b82f6","Not Started":"#d1d5db"}[d.status]||"#d1d5db"}` }}>

                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 3 }}>
                        <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "monospace", color: "#0f1f3d" }}>{d.name}</span>
                        <StatusBadge status={d.status} />
                        {isAssigned && <span style={{ fontSize: 9, color: "#059669", background: "#dcfce7", padding: "1px 6px", borderRadius: 99, fontWeight: 700 }}>Assigned</span>}
                        {isTeamLead && <span style={{ fontSize: 9, color: "#7c3aed", background: "#ede9fe", padding: "1px 6px", borderRadius: 99, fontWeight: 700 }}>Lead</span>}
                      </div>
                      <div style={{ fontSize: 12, color: "#6b7280", lineHeight: 1.4 }}>{d.description}</div>
                      {proj && <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 3, fontStyle: "italic" }}>{proj.name}</div>}
                    </div>
                    {d.deadline && (
                      <div style={{ textAlign: "right", flexShrink: 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: isOverdue ? "#dc2626" : daysLeft <= 7 ? "#d97706" : "#6b7280" }}>
                          {isOverdue ? Math.abs(daysLeft)+"d overdue" : daysLeft === 0 ? "Today" : daysLeft+"d left"}
                        </div>
                        <div style={{ fontSize: 11, color: "#9ca3af" }}>{new Date(d.deadline).toLocaleDateString("en-AU")}</div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}

          {myDels.length === 0 && involvedProjects.length === 0 && (
            <div style={{ textAlign: "center", padding: "40px", background: "#fff", borderRadius: 3, border: "1px solid #e2e5ea", color: "#9ca3af" }}>
              <Icon name="deliverables" size={36} color="#e2e5ea" style={{ margin: "0 auto 12px", display: "block" }} />
              <div style={{ fontSize: 14, fontWeight: 600 }}>No projects or deliverables assigned yet</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function PeopleView({ people, projects, deliverables, search, setSearch, onAdd, onEdit, onDelete }) {
  const [roleFilter, setRoleFilter] = useState("All");
  const [themeFilter, setThemeFilter] = useState("All");
  const [leaveFilter, setLeaveFilter] = useState("All");
  const [sortMode, setSortMode] = useState("leadership");
  const [selectedPerson, setSelectedPerson] = useState(null);
  const [profilePerson, setProfilePerson] = useState(null);

  const STUDENT_ROLES = ["PhD Candidate", "Masters Student"];
  const LEADERSHIP_ORDER = ["Team Leader", "Professor", "Associate Professor", "Senior Research Fellow", "Research Fellow", "Senior Honorary Fellow", "Environmental Risk Analyst", "Research Officer", "Senior Scientific Software Dev", "Scientific Software Developer", "Administrative Assistant", "Research Assistant", "PhD Candidate", "Masters Student"];

  const roleGroups = ["All", "Team Leader", "Professor", "Associate Professor", "Senior Research Fellow", "Research Fellow", "Senior Honorary Fellow", "Research Officer", "Research Assistant", "PhD Candidate", "Masters Student", "Environmental Risk Analyst", "Senior Scientific Software Dev", "Scientific Software Developer", "Administrative Assistant"];

  const isStudent = (p) => {
    const roles = Array.isArray(p.roles) ? p.roles : [p.role || ""];
    return roles.some(r => STUDENT_ROLES.includes(r));
  };

  const getRoleRank = (p) => {
    const roles = Array.isArray(p.roles) ? p.roles : [p.role || ""];
    return Math.min(...roles.map(r => { const idx = LEADERSHIP_ORDER.indexOf(r); return idx === -1 ? 99 : idx; }));
  };

  const filtered = people.filter(p => {
    const q = search.toLowerCase();
    const roles = Array.isArray(p.roles) ? p.roles : [p.role || ""];
    const matchSearch = !q || p.name.toLowerCase().includes(q) || (p.email || "").toLowerCase().includes(q) || roles.some(r => r.toLowerCase().includes(q));
    const matchRole = roleFilter === "All" || roles.includes(roleFilter);
    const matchTheme = themeFilter === "All" || (p.themes || []).includes(themeFilter);
    const matchLeave = leaveFilter === "All" || (leaveFilter === "On Leave" ? !!p.leaveType : !p.leaveType);
    return matchSearch && matchRole && matchTheme && matchLeave;
  });

  const sorted = [...filtered].sort((a, b) => {
    if (sortMode === "alpha") return a.name.localeCompare(b.name);
    return getRoleRank(a) - getRoleRank(b) || a.name.localeCompare(b.name);
  });

  const staff = sorted.filter(p => !isStudent(p));
  const students = sorted.filter(p => isStudent(p));

  const totalFTE = people.reduce((s, p) => s + (parseFloat(p.availability) || 0), 0);
  const staffFTE = people.filter(p => !isStudent(p)).reduce((s, p) => s + (parseFloat(p.availability) || 0), 0);
  const studentCount = people.filter(p => isStudent(p)).length;

  const PersonCard = ({ p }) => {
    const primaryRole = Array.isArray(p.roles) ? p.roles[0] : (p.role || "");
    const allRoles = Array.isArray(p.roles) ? p.roles : [p.role || ""];
    const roleColor = ROLE_COLORS[primaryRole] || "#6b7280";
    const projCount = projects.filter(pr => getLeads(pr).includes(p.name)).length;
    const assignedDels = deliverables.filter(d => (d.assignedTeam === p.name || d.teamLead === p.name) && d.status !== "Completed");
    const overdueDels = assignedDels.filter(d => d.deadline && new Date(d.deadline) < new Date());
    const themes = (p.themes || []).map(tid => RESEARCH_THEMES.find(t => t.id === tid)).filter(Boolean);

    return (
      <div onClick={() => setProfilePerson(p)} style={{ background: "#fff", borderRadius: 3, border: "1px solid #e2e5ea", boxShadow: "0 1px 4px rgba(0,0,0,0.06)", overflow: "hidden", transition: "box-shadow 0.15s", cursor: "pointer" }}
        onMouseEnter={e => e.currentTarget.style.boxShadow = "0 4px 16px rgba(0,0,0,0.1)"}
        onMouseLeave={e => e.currentTarget.style.boxShadow = "0 1px 4px rgba(0,0,0,0.06)"}>
        <div style={{ height: 5, background: roleColor }} />
        <div style={{ padding: "18px" }}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 14, marginBottom: 14 }}>
            <div style={{ width: 68, height: 68, borderRadius: "50%", background: roleColor + "20", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 24, color: roleColor, flexShrink: 0, overflow: "hidden", border: `3px solid ${roleColor}33`, boxShadow: "0 2px 8px rgba(0,0,0,0.08)" }}>
              {p.photoUrl ? <img src={p.photoUrl} alt={p.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : p.name.charAt(0)}
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 15, fontWeight: 800, color: "#0f1f3d", marginBottom: 2, lineHeight: 1.2 }}>{p.name}</div>
              <div style={{ fontSize: 12, color: "#9ca3af", marginBottom: 6 }}>{p.email}</div>
              <span style={{ fontSize: 11, fontWeight: 700,
                color: (p.availability||0) >= 1 ? "#059669" : (p.availability||0) >= 0.6 ? "#2563eb" : "#d97706",
                background: (p.availability||0) >= 1 ? "#dcfce7" : (p.availability||0) >= 0.6 ? "#dbeafe" : "#fef3c7",
                padding: "3px 10px", borderRadius: 99 }}>
                {p.availability || 0} FTE
              </span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4, flexShrink: 0, alignItems: "flex-end" }}>
              {overdueDels.length > 0 && (
                <div style={{ display: "flex", alignItems: "center", gap: 4, background: "#fef2f2", borderRadius: 99, padding: "3px 8px" }}>
                  <Icon name="alert" size={11} color="#dc2626" />
                  <span style={{ fontSize: 10, fontWeight: 700, color: "#dc2626" }}>{overdueDels.length}</span>
                </div>
              )}
              {p.leaveType && (
                <div style={{ display: "flex", alignItems: "center", gap: 4, background: "#fef9c3", borderRadius: 99, padding: "3px 8px" }}>
                  <Icon name="clock" size={11} color="#92400e" />
                  <span style={{ fontSize: 10, fontWeight: 700, color: "#92400e" }}>Away</span>
                </div>
              )}
            </div>
          </div>

          <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: themes.length > 0 ? 8 : 12 }}>
            {allRoles.map(r => (
              <span key={r} style={{ fontSize: 11, fontWeight: 700, color: ROLE_COLORS[r] || "#6b7280", background: (ROLE_COLORS[r] || "#6b7280") + "15", padding: "3px 9px", borderRadius: 99, border: `1px solid ${(ROLE_COLORS[r] || "#6b7280")}30` }}>{r}</span>
            ))}
          </div>

          {themes.length > 0 && (
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 12 }}>
              {themes.map(t => (
                <span key={t.id} style={{ fontSize: 10, fontWeight: 700, color: t.color, background: t.color + "12", padding: "2px 8px", borderRadius: 99, border: `1px solid ${t.color}25` }}>{t.label}</span>
              ))}
            </div>
          )}

          <div style={{ display: "flex", gap: 8, paddingTop: 10, borderTop: "1px solid #f0f2f5", marginBottom: 12 }}>
            {[
              { label: "Projects Led", val: projCount, color: "#7c3aed" },
              { label: "Active Tasks", val: assignedDels.length, color: "#2563eb" },
              { label: "Overdue", val: overdueDels.length, color: overdueDels.length > 0 ? "#dc2626" : "#9ca3af" },
            ].map(s => (
              <div key={s.label} style={{ flex: 1, textAlign: "center", padding: "8px 4px", background: "#f8f9fb", borderRadius: 3 }}>
                <div style={{ fontSize: 18, fontWeight: 900, color: s.color, fontFamily: "'Barlow Condensed', sans-serif", lineHeight: 1 }}>{s.val}</div>
                <div style={{ fontSize: 9, color: "#9ca3af", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.6, marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {p.leaveType && (() => {
            const now = new Date();
            const start = p.leaveStart ? new Date(p.leaveStart) : null;
            const end = p.leaveEnd ? new Date(p.leaveEnd) : null;
            const isAway = !(start && now < start) && !(end && now > end);
            const col = isAway ? "#92400e" : "#374151";
            const bg = isAway ? "#fef9c3" : "#f3f4f6";
            return (
              <div style={{ marginBottom: 10, padding: "9px 12px", borderRadius: 3, background: bg, border: `1px solid ${isAway ? "#fde68a" : "#e5e7eb"}`, display: "flex", alignItems: "flex-start", gap: 8 }}>
                <Icon name="clock" size={13} color={col} style={{ marginTop: 1, flexShrink: 0 }} />
                <div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: col }}>{p.leaveType}{isAway ? " — Currently Away" : " — Upcoming"}</div>
                  {(p.leaveStart || p.leaveEnd) && (
                    <div style={{ fontSize: 11, color: col, opacity: 0.8, marginTop: 1 }}>
                      {p.leaveStart && new Date(p.leaveStart).toLocaleDateString("en-AU", { day: "numeric", month: "short" })}
                      {p.leaveStart && p.leaveEnd && " → "}
                      {p.leaveEnd && new Date(p.leaveEnd).toLocaleDateString("en-AU", { day: "numeric", month: "short", year: "numeric" })}
                    </div>
                  )}
                  {p.leaveNote && <div style={{ fontSize: 11, color: col, opacity: 0.7, marginTop: 1, fontStyle: "italic" }}>{p.leaveNote}</div>}
                </div>
              </div>
            );
          })()}

          {(p.phone || p.notes) && (
            <div style={{ marginBottom: 10, fontSize: 12, color: "#6b7280" }}>
              {p.phone && <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 3 }}><Icon name="info" size={12} color="#9ca3af" />{p.phone}</div>}
              {p.notes && <div style={{ fontSize: 11, color: "#9ca3af", fontStyle: "italic", lineHeight: 1.4 }}>{p.notes?.slice(0, 80)}{p.notes?.length > 80 ? "…" : ""}</div>}
            </div>
          )}

          <div style={{ display: "flex", gap: 8 }} onClick={e => e.stopPropagation()}>
            <button onClick={() => setProfilePerson(p)} style={{ flex: 1, padding: "8px", border: "1.5px solid #e85d27", borderRadius: 2, background: "#fff", cursor: "pointer", fontSize: 11, fontWeight: 700, letterSpacing: 0.8, textTransform: "uppercase", color: "#e85d27", display: "flex", alignItems: "center", justifyContent: "center", gap: 5 }}>
              <Icon name="people" size={13} color="#e85d27" /> View Profile
            </button>
            <button onClick={() => onEdit(p)} style={{ padding: "8px 12px", border: "1.5px solid #dde1e9", borderRadius: 2, background: "#fff", cursor: "pointer", display: "flex", alignItems: "center" }}>
              <Icon name="edit" size={14} color="#6b7280" />
            </button>
            <button onClick={() => { if (confirm("Remove " + p.name + "?")) onDelete(p.id); }} style={{ padding: "8px 12px", border: "1.5px solid #fecaca", borderRadius: 2, background: "#fff", cursor: "pointer", display: "flex", alignItems: "center" }}>
              <Icon name="trash" size={14} color="#dc2626" />
            </button>
          </div>
        </div>
      </div>
    );
  };

  // Show profile page if a person is clicked
  if (profilePerson) {
    return <PersonProfilePage
      person={people.find(p => p.id === profilePerson.id) || profilePerson}
      people={people} projects={projects} deliverables={deliverables}
      onBack={() => setProfilePerson(null)}
      onEdit={p => { onEdit(p); setProfilePerson(null); }}
    />;
  }

  const SectionHeading = ({ label, count, color }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, marginTop: 4 }}>
      <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 20, textTransform: "uppercase", letterSpacing: 1, color: "#0f1f3d" }}>{label}</div>
      <div style={{ background: color + "18", color, borderRadius: 99, padding: "2px 12px", fontSize: 12, fontWeight: 700 }}>{count}</div>
      <div style={{ flex: 1, height: 1, background: "#e8eaed" }} />
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h1 style={{ margin: 0, fontFamily: "'Barlow Condensed', sans-serif", fontSize: 34, fontWeight: 900, textTransform: "uppercase", letterSpacing: 1 }}>People</h1>
          <p style={{ margin: "4px 0 0", color: "#6b7280", fontSize: 14, fontWeight: 500 }}>{filtered.length} of {people.length} team members</p>
        </div>
        <button onClick={onAdd} style={{ background: "#e85d27", color: "#fff", border: "none", borderRadius: 2, padding: "10px 22px", fontWeight: 700, fontSize: 12, cursor: "pointer", letterSpacing: 0.8, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 6 }}>
          <Icon name="plus" size={15} color="#fff" /> Add Person
        </button>
      </div>

      {/* Stats strip — split staff vs students */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 20 }}>
        <div style={{ background: "#fff", borderRadius: 3, padding: "16px 20px", border: "1px solid #e2e5ea", borderLeft: "4px solid #0f1f3d", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 13, textTransform: "uppercase", letterSpacing: 0.8, color: "#0f1f3d", marginBottom: 12 }}>Staff</div>
          <div style={{ display: "flex", gap: 20 }}>
            {[
              { label: "Total", value: people.filter(p => !isStudent(p)).length, color: "#0f1f3d" },
              { label: "FTE", value: staffFTE.toFixed(1), color: "#e85d27" },
              { label: "Full-time", value: people.filter(p => !isStudent(p) && (parseFloat(p.availability)||0) >= 1).length, color: "#16a34a" },
              { label: "Part-time", value: people.filter(p => !isStudent(p) && (parseFloat(p.availability)||0) < 1).length, color: "#2563eb" },
              { label: "On Leave", value: people.filter(p => !isStudent(p) && p.leaveType).length, color: "#d97706" },
            ].map(s => (
              <div key={s.label} style={{ textAlign: "center" }}>
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 26, fontWeight: 900, color: s.color, lineHeight: 1 }}>{s.value}</div>
                <div style={{ fontSize: 10, color: "#9ca3af", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.6, marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ background: "#fff", borderRadius: 3, padding: "16px 20px", border: "1px solid #e2e5ea", borderLeft: "4px solid #7c3aed", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 13, textTransform: "uppercase", letterSpacing: 0.8, color: "#7c3aed", marginBottom: 12 }}>Students</div>
          <div style={{ display: "flex", gap: 20 }}>
            {[
              { label: "Total", value: studentCount, color: "#7c3aed" },
              { label: "PhD", value: people.filter(p => (Array.isArray(p.roles)?p.roles:[p.role||""]).includes("PhD Candidate")).length, color: "#2563eb" },
              { label: "Masters", value: people.filter(p => (Array.isArray(p.roles)?p.roles:[p.role||""]).includes("Masters Student")).length, color: "#059669" },
              { label: "On Leave", value: people.filter(p => isStudent(p) && p.leaveType).length, color: "#d97706" },
            ].map(s => (
              <div key={s.label} style={{ textAlign: "center" }}>
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 26, fontWeight: 900, color: s.color, lineHeight: 1 }}>{s.value}</div>
                <div style={{ fontSize: 10, color: "#9ca3af", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.6, marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Filters + sort */}
      <div style={{ display: "flex", gap: 10, marginBottom: 24, flexWrap: "wrap" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name, email or role…"
          style={{ flex: 1, minWidth: 220, padding: "10px 16px", border: "1.5px solid #dde1e9", borderRadius: 3, fontSize: 14, outline: "none", background: "#fff" }} />
        <select value={roleFilter} onChange={e => setRoleFilter(e.target.value)} style={{ padding: "10px 14px", border: "1.5px solid #dde1e9", borderRadius: 3, fontSize: 13, outline: "none", background: "#fff", cursor: "pointer" }}>
          {roleGroups.map(r => <option key={r}>{r}</option>)}
        </select>
        <select value={themeFilter} onChange={e => setThemeFilter(e.target.value)} style={{ padding: "10px 14px", border: "1.5px solid #dde1e9", borderRadius: 3, fontSize: 13, outline: "none", background: "#fff", cursor: "pointer" }}>
          <option value="All">All Themes</option>
          {RESEARCH_THEMES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
        </select>
        <select value={leaveFilter} onChange={e => setLeaveFilter(e.target.value)} style={{ padding: "10px 14px", border: "1.5px solid #dde1e9", borderRadius: 3, fontSize: 13, outline: "none", background: "#fff", cursor: "pointer" }}>
          <option value="All">All Staff</option>
          <option value="On Leave">On Leave</option>
          <option value="Available">Available</option>
        </select>
        <div style={{ display: "flex", background: "#fff", border: "1.5px solid #dde1e9", borderRadius: 3, overflow: "hidden" }}>
          {[{ id: "leadership", label: "By Role" }, { id: "alpha", label: "A–Z" }].map(s => (
            <button key={s.id} onClick={() => setSortMode(s.id)} style={{ padding: "10px 14px", border: "none", background: sortMode === s.id ? "#0f1f3d" : "#fff", color: sortMode === s.id ? "#fff" : "#6b7280", fontSize: 12, fontWeight: 700, cursor: "pointer", letterSpacing: 0.5 }}>{s.label}</button>
          ))}
        </div>
      </div>

      {/* Staff section */}
      {staff.length > 0 && (
        <div style={{ marginBottom: 32 }}>
          <SectionHeading label="Staff" count={staff.length} color="#0f1f3d" />
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16 }}>
            {staff.map(p => <PersonCard key={p.id} p={p} />)}
          </div>
        </div>
      )}

      {/* Students section */}
      {students.length > 0 && (
        <div>
          <SectionHeading label="Students" count={students.length} color="#7c3aed" />
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16 }}>
            {students.map(p => <PersonCard key={p.id} p={p} />)}
          </div>
        </div>
      )}

      {filtered.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 0", color: "#9ca3af" }}>
          <Icon name="people" size={48} color="#e2e5ea" style={{ margin: "0 auto 12px", display: "block" }} />
          <div style={{ fontSize: 16, fontWeight: 600 }}>No people match your filters</div>
        </div>
      )}
    </div>
  );
}

// ── Deliverables View ─────────────────────────────────────────────────────────
function DeliverablesView({ deliverables, projects, people, search, setSearch, filterStatus, setFilterStatus, onAdd, onEdit, onDelete }) {
  const filtered = deliverables.filter(d => {
    const q = search.toLowerCase();
    const proj = projects.find(p => p.id === d.project);
    const matchSearch = !q || d.name.toLowerCase().includes(q) || (d.description || "").toLowerCase().includes(q) || (proj?.name || "").toLowerCase().includes(q);
    const matchStatus = filterStatus === "All" || d.status === filterStatus;
    return matchSearch && matchStatus;
  });

  const grouped = {};
  filtered.forEach(d => {
    const key = d.project || "unassigned";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(d);
  });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h1 style={{ margin: 0, fontSize: 34, fontWeight: 900, fontFamily: "'Barlow Condensed', sans-serif", textTransform: "uppercase", letterSpacing: 1 }}>Deliverables</h1>
          <p style={{ margin: "4px 0 0", color: "#6b7280", fontSize: 14, fontWeight: 500 }}>{filtered.length} total</p>
        </div>
        <button onClick={onAdd} style={{ background: "#2563eb", color: "#fff", border: "none", borderRadius: 2, padding: "10px 20px", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
          Add Deliverable
        </button>
      </div>

      <div style={{ display: "flex", gap: 12, marginBottom: 20 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search deliverables…" style={{ flex: 1, padding: "10px 14px", border: "1.5px solid #e5e7eb", borderRadius: 2, fontSize: 14, outline: "none", background: "#fff" }} />
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ padding: "10px 14px", border: "1.5px solid #e5e7eb", borderRadius: 2, fontSize: 14, outline: "none", background: "#fff", cursor: "pointer" }}>
          {["All", "Completed", "In Progress", "Not Started"].map(s => <option key={s}>{s}</option>)}
        </select>
      </div>

      {Object.entries(grouped).map(([projId, items]) => {
        const proj = projects.find(p => p.id === projId);
        return (
          <div key={projId} style={{ marginBottom: 24 }}>
            <div style={{ fontWeight: 800, fontSize: 12, color: "#0f1f3d", marginBottom: 10, textTransform: "uppercase", letterSpacing: 1.2, fontFamily: "'Barlow Condensed', sans-serif", fontSize: 14 }}>
              {proj ? proj.name : "Unassigned"} ({items.length})
            </div>
            <div style={{ background: "#fff", borderRadius: 2, boxShadow: "0 1px 4px rgba(0,0,0,0.07)", overflow: "hidden" }}>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead>
                  <tr style={{ background: "#f8fafc", borderBottom: "2px solid #f0f0f0" }}>
                    {["ID", "Description", "Deadline", "Status", "Assigned", "Actions"].map(h => (
                      <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: 0.5 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {items.map((d, i) => {
                    const isOverdue = d.deadline && d.status !== "Completed" && new Date(d.deadline) < new Date();
                    return (
                      <tr key={d.id} style={{ borderBottom: i < items.length - 1 ? "1px solid #f5f5f5" : "none" }}>
                        <td style={{ padding: "11px 14px", fontWeight: 700, fontSize: 13, fontFamily: "'DM Mono', monospace", color: "#1e3a5f" }}>{d.name}</td>
                        <td style={{ padding: "11px 14px", fontSize: 13, color: "#374151", maxWidth: 300 }}>{d.description}</td>
                        <td style={{ padding: "11px 14px", fontSize: 12, color: isOverdue ? "#dc2626" : "#6b7280", fontWeight: isOverdue ? 700 : 400 }}>
                          {d.deadline ? new Date(d.deadline).toLocaleDateString("en-AU") : "–"}
                          {isOverdue && " ⚠"}
                        </td>
                        <td style={{ padding: "11px 14px" }}><StatusBadge status={d.status} /></td>
                        <td style={{ padding: "11px 14px", fontSize: 13, color: "#6b7280" }}>{d.assignedTeam || "–"}</td>
                        <td style={{ padding: "11px 14px" }}>
                          <div style={{ display: "flex", gap: 6 }}>
                            <button onClick={() => onEdit(d)} style={{ padding: "4px 10px", border: "1.5px solid #e5e7eb", borderRadius: 6, background: "#fff", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Edit</button>
                            <button onClick={() => { if (confirm("Delete?")) onDelete(d.id); }} style={{ padding: "4px 8px", border: "1.5px solid #fee2e2", borderRadius: 6, background: "#fff", cursor: "pointer", fontSize: 12, color: "#dc2626" }}>🗑</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Task Deliverable Row (top-level to avoid hooks-in-nested-fn error) ────────
function TaskDeliverableRow({ d, accent, selectedPerson, projects, today, onEditDeliverable, onUpdateDeliverable }) {
  const proj = projects.find(p => p.id === d.project);
  const isOverdue = d.deadline && d.status !== "Completed" && new Date(d.deadline) < today;
  const daysUntil = d.deadline ? Math.round((new Date(d.deadline) - today) / (1000 * 60 * 60 * 24)) : null;
  const isLead = d.teamLead === selectedPerson;
  const isAssigned = d.assignedTeam === selectedPerson;

  return (
    <div style={{
      display: "flex", alignItems: "flex-start", gap: 12, padding: "14px 16px",
      borderBottom: "1px solid #f3f4f6", background: "#fff",
      borderLeft: `3px solid ${isOverdue ? "#ef4444" : accent || "#e5e7eb"}`,
    }}>
      <button onClick={() => onUpdateDeliverable({ ...d, status: d.status === "Completed" ? "In Progress" : "Completed" })} style={{
        width: 20, height: 20, borderRadius: 6, border: `2px solid ${d.status === "Completed" ? "#22c55e" : "#d1d5db"}`,
        background: d.status === "Completed" ? "#22c55e" : "#fff", cursor: "pointer", flexShrink: 0, marginTop: 2,
        display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#fff", fontWeight: 700,
      }}>
        {d.status === "Completed" ? "✓" : ""}
      </button>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
          <span style={{ fontWeight: 700, fontSize: 13, fontFamily: "'DM Mono', monospace", color: "#1e3a5f" }}>{d.name}</span>
          <StatusBadge status={d.status} />
          {isLead && <Tag label="Lead" color="#7c3aed" />}
          {isAssigned && <Tag label="Assigned" color="#059669" />}
        </div>
        <div style={{ fontSize: 13, color: "#374151", marginTop: 3, lineHeight: 1.4 }}>{d.description}</div>
        {proj && (
          <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 3, fontStyle: "italic" }}>
            📋 {proj.name?.slice(0, 60)}{proj.name?.length > 60 ? "…" : ""}
          </div>
        )}
      </div>
      <div style={{ textAlign: "right", flexShrink: 0 }}>
        {d.deadline && (
          <div style={{ fontSize: 12, fontWeight: 700, color: isOverdue ? "#dc2626" : daysUntil <= 7 ? "#d97706" : "#6b7280" }}>
            {isOverdue ? `${Math.abs(daysUntil)}d overdue` : daysUntil === 0 ? "Due today" : daysUntil === 1 ? "Tomorrow" : `${daysUntil}d left`}
          </div>
        )}
        {d.deadline && (
          <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 1 }}>
            {new Date(d.deadline).toLocaleDateString("en-AU")}
          </div>
        )}
        <button onClick={() => onEditDeliverable(d)} style={{ marginTop: 6, padding: "3px 10px", border: "1.5px solid #e5e7eb", borderRadius: 6, background: "#f9fafb", cursor: "pointer", fontSize: 11, fontWeight: 600, color: "#374151" }}>
          Edit
        </button>
      </div>
    </div>
  );
}

// ── Task Section (top-level to avoid hooks-in-nested-fn error) ────────────────
function TaskSection({ title, items, accent, emptyMsg, selectedPerson, projects, today, onEditDeliverable, onUpdateDeliverable }) {
  const [open, setOpen] = useState(true);
  if (items.length === 0 && !emptyMsg) return null;
  return (
    <div style={{ marginBottom: 20 }}>
      <button onClick={() => setOpen(o => !o)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, padding: "8px 0", width: "100%" }}>
        <span style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: 0.8, color: accent || "#6b7280" }}>{title}</span>
        <span style={{ background: accent ? accent + "22" : "#f3f4f6", color: accent || "#6b7280", borderRadius: 99, padding: "1px 8px", fontSize: 11, fontWeight: 700 }}>{items.length}</span>
        <span style={{ marginLeft: "auto", fontSize: 12, color: "#9ca3af" }}>{open ? "▲" : "▼"}</span>
      </button>
      {open && (
        <div style={{ background: "#fff", borderRadius: 2, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.07)", border: "1.5px solid #f0f0f0" }}>
          {items.length === 0
            ? <div style={{ padding: "16px", fontSize: 13, color: "#9ca3af", fontStyle: "italic" }}>{emptyMsg}</div>
            : items.map(d => (
                <TaskDeliverableRow key={d.id} d={d} accent={accent} selectedPerson={selectedPerson}
                  projects={projects} today={today} onEditDeliverable={onEditDeliverable} onUpdateDeliverable={onUpdateDeliverable} />
              ))
          }
        </div>
      )}
    </div>
  );
}

// ── My Tasks View ─────────────────────────────────────────────────────────────
function MyTasksView({ projects, people, deliverables, onEditDeliverable, onUpdateDeliverable }) {
  const [selectedPerson, setSelectedPerson] = useState("");
  const [filterStatus, setFilterStatus] = useState("Active");

  const today = new Date();
  const person = people.find(p => p.name === selectedPerson);

  const myDeliverables = selectedPerson
    ? deliverables.filter(d => d.assignedTeam === selectedPerson || d.teamLead === selectedPerson)
    : [];

  const myProjects = selectedPerson
    ? projects.filter(p => getLeads(p).includes(selectedPerson))
    : [];

  const filtered = myDeliverables.filter(d => {
    if (filterStatus === "Active") return d.status !== "Completed";
    if (filterStatus === "Completed") return d.status === "Completed";
    return true;
  });

  const overdue = filtered.filter(d => d.deadline && d.status !== "Completed" && new Date(d.deadline) < today);
  const upcoming = filtered.filter(d => {
    if (!d.deadline || d.status === "Completed") return false;
    const diff = (new Date(d.deadline) - today) / (1000 * 60 * 60 * 24);
    return diff >= 0 && diff <= 30;
  });
  const later = filtered.filter(d => {
    if (!d.deadline || d.status === "Completed") return false;
    const diff = (new Date(d.deadline) - today) / (1000 * 60 * 60 * 24);
    return diff > 30;
  });
  const noDue = filtered.filter(d => !d.deadline && d.status !== "Completed");
  const completedList = myDeliverables.filter(d => d.status === "Completed");

  const primaryRole = Array.isArray(person?.roles) ? person.roles[0] : (person?.role || "");
  const roleColor = person ? (ROLE_COLORS[primaryRole] || "#6b7280") : "#6b7280";

  const sectionProps = { selectedPerson, projects, today, onEditDeliverable, onUpdateDeliverable };

  return (
    <div>
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ margin: 0, fontSize: 34, fontWeight: 900, fontFamily: "'Barlow Condensed', sans-serif", textTransform: "uppercase", letterSpacing: 1 }}>My Tasks</h1>
        <p style={{ margin: "4px 0 0", color: "#6b7280", fontSize: 14, fontWeight: 500 }}>Select a team member to view their workload</p>
      </div>

      <div style={{ background: "#fff", borderRadius: 2, padding: 20, boxShadow: "0 1px 4px rgba(0,0,0,0.07)", marginBottom: 24 }}>
        <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ flex: 1, minWidth: 220 }}>
            <label style={{ fontSize: 12, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Team Member</label>
            <select value={selectedPerson} onChange={e => setSelectedPerson(e.target.value)}
              style={{ width: "100%", padding: "10px 14px", border: "1.5px solid #e5e7eb", borderRadius: 2, fontSize: 14, outline: "none", background: "#fafafa", cursor: "pointer", fontFamily: "inherit" }}>
              <option value="">— Select a person —</option>
              {[...people].sort((a, b) => a.name.localeCompare(b.name)).map(p => (
                <option key={p.id} value={p.name}>{p.name} · {p.role}</option>
              ))}
            </select>
          </div>
          <div>
            <label style={{ fontSize: 12, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Show</label>
            <div style={{ display: "flex", gap: 6 }}>
              {["Active", "Completed", "All"].map(s => (
                <button key={s} onClick={() => setFilterStatus(s)} style={{
                  padding: "9px 16px", borderRadius: 3, border: "1.5px solid", cursor: "pointer", fontSize: 13, fontWeight: 600,
                  borderColor: filterStatus === s ? "#2563eb" : "#e5e7eb",
                  background: filterStatus === s ? "#2563eb" : "#fff",
                  color: filterStatus === s ? "#fff" : "#374151",
                }}>{s}</button>
              ))}
            </div>
          </div>
        </div>

        {person && (
          <div style={{ marginTop: 20, paddingTop: 20, borderTop: "1px solid #f0f0f0", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
            <div style={{ width: 52, height: 52, borderRadius: "50%", background: roleColor + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, fontWeight: 800, color: roleColor, flexShrink: 0, overflow: "hidden" }}>
              {person.photoUrl
                ? <img src={person.photoUrl} alt={person.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                : person.name.charAt(0)}
            </div>
            <div>
              <div style={{ fontWeight: 800, fontSize: 18, color: "#0f172a" }}>{person.name}</div>
              <div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}>
                {(Array.isArray(person.roles) ? person.roles : [person.role]).map(r => (
                  <Tag key={r} label={r} color={ROLE_COLORS[r] || "#6b7280"} />
                ))}
                {(person.themes || []).map(tid => {
                  const t = RESEARCH_THEMES.find(t => t.id === tid);
                  return t ? <Tag key={tid} label={t.label} color={t.color} /> : null;
                })}
                <Tag label={`${person.availability} FTE`} color={person.availability >= 1 ? "#059669" : person.availability >= 0.6 ? "#2563eb" : "#d97706"} />
              </div>
            </div>
            <div style={{ marginLeft: "auto", display: "flex", gap: 20, textAlign: "center", flexWrap: "wrap" }}>
              {[
                { label: "Total Tasks", value: myDeliverables.length, color: "#374151" },
                { label: "Active", value: myDeliverables.filter(d => d.status !== "Completed").length, color: "#2563eb" },
                { label: "Done", value: completedList.length, color: "#16a34a" },
                { label: "Overdue", value: overdue.length, color: "#dc2626" },
                { label: "Projects Led", value: myProjects.length, color: "#7c3aed" },
              ].map(s => (
                <div key={s.label}>
                  <div style={{ fontSize: 22, fontWeight: 800, color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: 11, color: "#9ca3af", fontWeight: 600 }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {!selectedPerson && (
        <div style={{ textAlign: "center", padding: "60px 0", color: "#9ca3af" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🙋</div>
          <div style={{ fontSize: 16, fontWeight: 600 }}>Select a team member above to see their tasks</div>
          <div style={{ fontSize: 14, marginTop: 4 }}>Shows all deliverables they're assigned to or leading</div>
        </div>
      )}

      {selectedPerson && myDeliverables.length === 0 && (
        <div style={{ textAlign: "center", padding: "60px 0", color: "#9ca3af" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>✨</div>
          <div style={{ fontSize: 16, fontWeight: 600 }}>No deliverables assigned to {selectedPerson}</div>
          <div style={{ fontSize: 14, marginTop: 4 }}>Add deliverables in the Deliverables tab and assign them to this person</div>
        </div>
      )}

      {selectedPerson && myDeliverables.length > 0 && (
        <div>
          {filterStatus !== "Completed" && (
            <>
              <TaskSection title="Overdue" items={overdue} accent="#dc2626" {...sectionProps} />
              <TaskSection title="Due This Week" items={upcoming.filter(d => { const diff=(new Date(d.deadline)-today)/86400000; return diff>=0&&diff<=7; })} accent="#f59e0b" {...sectionProps} />
              <TaskSection title="Due within 30 days" items={upcoming.filter(d => { const diff=(new Date(d.deadline)-today)/86400000; return diff>7&&diff<=30; })} accent="#d97706" {...sectionProps} />
              <TaskSection title="Upcoming" items={later} accent="#2563eb" {...sectionProps} />
              <TaskSection title="No Deadline" items={noDue} accent="#6b7280" {...sectionProps} />
            </>
          )}
          {filterStatus === "Completed" && (
            <TaskSection title="Completed" items={completedList} accent="#16a34a" emptyMsg="No completed deliverables yet." {...sectionProps} />
          )}
          {filterStatus === "All" && (
            <>
              <TaskSection title="Overdue" items={overdue} accent="#dc2626" {...sectionProps} />
              <TaskSection title="Due This Week" items={upcoming.filter(d => { const diff=(new Date(d.deadline)-today)/86400000; return diff>=0&&diff<=7; })} accent="#f59e0b" {...sectionProps} />
              <TaskSection title="Due within 30 days" items={upcoming.filter(d => { const diff=(new Date(d.deadline)-today)/86400000; return diff>7&&diff<=30; })} accent="#d97706" {...sectionProps} />
              <TaskSection title="Upcoming" items={later} accent="#2563eb" {...sectionProps} />
              <TaskSection title="No Deadline" items={noDue} accent="#6b7280" {...sectionProps} />
              <TaskSection title="Completed" items={completedList} accent="#16a34a" {...sectionProps} />
            </>
          )}

          {myProjects.length > 0 && (
            <div style={{ marginTop: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: 0.8, color: "#7c3aed", marginBottom: 10 }}>
                Projects Led · {myProjects.length}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 12 }}>
                {myProjects.map(p => (
                  <div key={p.id} style={{ background: "#fff", borderRadius: 2, padding: "14px 16px", border: "1.5px solid #f0f0f0", boxShadow: "0 1px 3px rgba(0,0,0,0.05)", borderLeft: "3px solid #7c3aed" }}>
                    <div style={{ fontWeight: 700, fontSize: 13, color: "#0f172a", marginBottom: 4 }}>{p.name}</div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <StatusBadge status={p.status} />
                      <span style={{ fontSize: 12, color: "#7c3aed", fontWeight: 700 }}>{p.progress || 0}%</span>
                    </div>
                    <div style={{ marginTop: 8 }}><ProgressBar value={p.progress || 0} color="#7c3aed" /></div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}



    </div>
  );
}

// ── PIN Gate ──────────────────────────────────────────────────────────────────
const MGMT_PASSWORD = "fire2024";

function PinGate({ onUnlock }) {
  const [input, setInput] = useState("");
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);

  const attempt = () => {
    if (input === MGMT_PASSWORD) {
      onUnlock();
    } else {
      setError(true);
      setShake(true);
      setInput("");
      setTimeout(() => setShake(false), 500);
    }
  };

  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "60vh" }}>
      <style>{`@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }`}</style>
      <div style={{
        background: "#fff", borderRadius: 2, padding: "48px 40px", borderTop: "4px solid #e85d27", maxWidth: 400, width: "100%",
        boxShadow: "0 8px 40px rgba(0,0,0,0.12)", textAlign: "center",
        animation: shake ? "shake 0.4s ease" : "none",
      }}>
        <div style={{ width: 64, height: 64, background: "#0f1f3d", borderRadius: 3, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", borderBottom: "4px solid #e85d27" }}><Icon name="lock" size={28} color="#e85d27" /></div>
        <h2 style={{ margin: "0 0 6px", fontSize: 22, fontWeight: 800, color: "#0f172a" }}>Management View</h2>
        <p style={{ margin: "0 0 28px", color: "#6b7280", fontSize: 14 }}>Enter the management password to continue</p>
        <input
          type="password"
          value={input}
          onChange={e => { setInput(e.target.value); setError(false); }}
          onKeyDown={e => e.key === "Enter" && attempt()}
          placeholder="Password"
          style={{
            width: "100%", padding: "12px 16px", border: `2px solid ${error ? "#ef4444" : "#e5e7eb"}`,
            borderRadius: 2, fontSize: 16, outline: "none", textAlign: "center", letterSpacing: 2,
            marginBottom: 12, background: "#fafafa", fontFamily: "inherit", boxSizing: "border-box",
          }}
          autoFocus
        />
        {error && <p style={{ margin: "0 0 12px", color: "#ef4444", fontSize: 13, fontWeight: 600 }}>Incorrect password. Try again.</p>}
        <button onClick={attempt} style={{
          width: "100%", padding: "12px", background: "#1e3a5f", color: "#fff", border: "none",
          borderRadius: 2, fontSize: 15, fontWeight: 700, cursor: "pointer",
        }}>
          Unlock →
        </button>
        <p style={{ margin: "16px 0 0", fontSize: 12, color: "#9ca3af" }}>Access restricted to management team</p>
      </div>
    </div>
  );
}

// ── Management View ───────────────────────────────────────────────────────────
function SalaryEditor({ person, allocation, projects, onSave, onCancel }) {
  const [sources, setSources] = useState(allocation.sources || []);
  const [contracts, setContracts] = useState(allocation.contracts || []);
  const [notes, setNotes] = useState(allocation.notes || "");
  const [activeTab, setActiveTab] = useState("current");

  const addSource = () => setSources(s => [...s, { projectId: "", source: "", fte: 0, startDate: "", endDate: "", notes: "" }]);
  const updateSource = (i, field, val) => setSources(s => s.map((src, idx) => idx === i ? { ...src, [field]: val } : src));
  const removeSource = (i) => setSources(s => s.filter((_, idx) => idx !== i));

  const addContract = () => setContracts(c => [...c, { id: "c"+Date.now(), projectId: "", source: "", fte: 0, startDate: "", endDate: "", notes: "" }]);
  const updateContract = (i, field, val) => setContracts(c => c.map((con, idx) => idx === i ? { ...con, [field]: val } : con));
  const removeContract = (i) => setContracts(c => c.filter((_, idx) => idx !== i));

  const totalFTE = sources.reduce((s, src) => s + (parseFloat(src.fte)||0), 0);
  const available = parseFloat(person.availability) || 0;
  const today = new Date();

  const expiringWarning = sources.filter(src => {
    if (!src.endDate) return false;
    const diff = (new Date(src.endDate) - today) / 86400000;
    return diff >= 0 && diff <= 60;
  });
  const expiredSources = sources.filter(src => src.endDate && new Date(src.endDate) < today);

  const SourceRow = ({ src, i, isContract }) => {
    const update = isContract ? (f, v) => updateContract(i, f, v) : (f, v) => updateSource(i, f, v);
    const remove = isContract ? () => removeContract(i) : () => removeSource(i);
    const endDiff = src.endDate ? Math.round((new Date(src.endDate) - today) / 86400000) : null;
    const isExpired = endDiff !== null && endDiff < 0;
    const isExpiring = endDiff !== null && endDiff >= 0 && endDiff <= 60;
    return (
      <div style={{ background: isExpired ? "#fef2f2" : "#fff", borderRadius: 3, border: `1px solid ${isExpired ? "#fca5a5" : isExpiring ? "#fde68a" : "#e2e5ea"}`, padding: "12px", marginBottom: 10 }}>
        {(isExpired || isExpiring) && (
          <div style={{ fontSize: 11, fontWeight: 700, color: isExpired ? "#dc2626" : "#d97706", marginBottom: 8, display: "flex", alignItems: "center", gap: 5 }}>
            <Icon name="alert" size={12} color={isExpired ? "#dc2626" : "#d97706"} />
            {isExpired ? `Contract ended ${Math.abs(endDiff)}d ago` : `Expires in ${endDiff}d`}
          </div>
        )}
        <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
          <select value={src.projectId} onChange={e => update("projectId", e.target.value)}
            style={{ flex: 2, minWidth: 160, padding: "7px 10px", border: "1.5px solid #dde1e9", borderRadius: 3, fontSize: 12, outline: "none", fontFamily: "inherit", background: "#fff" }}>
            <option value="">— Select project or source —</option>
            {projects.map(p => <option key={p.id} value={p.id}>{p.name?.slice(0,50)}</option>)}
            <option value="__university">University base salary</option>
            <option value="__scholarship">Scholarship</option>
            <option value="__fellowship">Fellowship</option>
            <option value="__other">Other</option>
          </select>
          <input value={src.source} onChange={e => update("source", e.target.value)} placeholder="Label / contract ref"
            style={{ flex: 1.5, minWidth: 120, padding: "7px 10px", border: "1.5px solid #dde1e9", borderRadius: 3, fontSize: 12, outline: "none", fontFamily: "inherit" }} />
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <input type="number" min="0" max="5" step="0.1" value={src.fte} onChange={e => update("fte", e.target.value)}
              style={{ width: 65, padding: "7px 10px", border: "1.5px solid #dde1e9", borderRadius: 3, fontSize: 12, outline: "none", fontFamily: "inherit", textAlign: "center" }} />
            <span style={{ fontSize: 11, color: "#9ca3af" }}>FTE</span>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 11, color: "#9ca3af", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, whiteSpace: "nowrap" }}>Start</span>
            <input type="date" value={src.startDate||""} onChange={e => update("startDate", e.target.value)}
              style={{ padding: "6px 10px", border: "1.5px solid #dde1e9", borderRadius: 3, fontSize: 12, outline: "none", fontFamily: "inherit" }} />
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 11, color: "#9ca3af", fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, whiteSpace: "nowrap" }}>End</span>
            <input type="date" value={src.endDate||""} onChange={e => update("endDate", e.target.value)}
              style={{ padding: "6px 10px", border: `1.5px solid ${isExpired ? "#fca5a5" : isExpiring ? "#fde68a" : "#dde1e9"}`, borderRadius: 3, fontSize: 12, outline: "none", fontFamily: "inherit", background: isExpired ? "#fef2f2" : isExpiring ? "#fef9c3" : "#fff" }} />
          </div>
          <input value={src.notes||""} onChange={e => update("notes", e.target.value)} placeholder="Notes…" style={{ flex: 1, minWidth: 120, padding: "7px 10px", border: "1.5px solid #dde1e9", borderRadius: 3, fontSize: 12, outline: "none", fontFamily: "inherit" }} />
          <button onClick={remove} style={{ padding: "7px 8px", border: "1px solid #fecaca", borderRadius: 2, background: "#fff", cursor: "pointer", flexShrink: 0 }}>
            <Icon name="trash" size={13} color="#dc2626" />
          </button>
        </div>
      </div>
    );
  };

  return (
    <div style={{ background: "#f8f9fb", borderRadius: 3, padding: 14, border: "1px solid #e2e5ea" }}>
      {/* Tabs */}
      <div style={{ display: "flex", gap: 0, marginBottom: 12, background: "#fff", border: "1.5px solid #dde1e9", borderRadius: 3, overflow: "hidden", width: "fit-content" }}>
        {[{ id: "current", label: "Current Allocations" }, { id: "history", label: "Contract History" }].map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ padding: "7px 16px", border: "none", background: activeTab === t.id ? "#0f1f3d" : "#fff", color: activeTab === t.id ? "#fff" : "#6b7280", fontSize: 11, fontWeight: 700, cursor: "pointer", letterSpacing: 0.5, textTransform: "uppercase" }}>{t.label}</button>
        ))}
      </div>

      {activeTab === "current" && (
        <div>
          {expiringWarning.length > 0 && (
            <div style={{ padding: "8px 12px", background: "#fef9c3", border: "1px solid #fde68a", borderRadius: 3, marginBottom: 10, fontSize: 12, fontWeight: 600, color: "#92400e", display: "flex", alignItems: "center", gap: 6 }}>
              <Icon name="alert" size={13} color="#d97706" />
              {expiringWarning.length} contract{expiringWarning.length > 1 ? "s" : ""} expiring within 60 days
            </div>
          )}
          {sources.map((src, i) => <SourceRow key={i} src={src} i={i} isContract={false} />)}
          <button onClick={addSource} style={{ display: "flex", alignItems: "center", gap: 5, padding: "7px 14px", border: "1.5px dashed #dde1e9", borderRadius: 3, background: "transparent", cursor: "pointer", fontSize: 12, fontWeight: 600, color: "#6b7280", marginBottom: 10 }}>
            <Icon name="plus" size={13} color="#6b7280" /> Add current allocation
          </button>
          <div style={{ fontSize: 12, fontWeight: 700, color: totalFTE > available + 0.01 ? "#dc2626" : totalFTE < available - 0.01 ? "#d97706" : "#16a34a", marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
            <Icon name="budget" size={13} color={totalFTE > available + 0.01 ? "#dc2626" : totalFTE < available - 0.01 ? "#d97706" : "#16a34a"} />
            {totalFTE.toFixed(1)} / {available} FTE allocated {totalFTE > available + 0.01 ? "⚠ Over!" : totalFTE < available - 0.01 ? `— ${(available-totalFTE).toFixed(1)} FTE gap` : "✓ Fully covered"}
          </div>
        </div>
      )}

      {activeTab === "history" && (
        <div>
          <div style={{ fontSize: 12, color: "#9ca3af", marginBottom: 10 }}>Log all past and upcoming contracts — useful for tracking funding continuity over time.</div>
          {contracts.length === 0 && <div style={{ fontSize: 13, color: "#9ca3af", fontStyle: "italic", marginBottom: 10 }}>No contract history recorded yet.</div>}
          {contracts.map((con, i) => <SourceRow key={con.id||i} src={con} i={i} isContract={true} />)}
          <button onClick={addContract} style={{ display: "flex", alignItems: "center", gap: 5, padding: "7px 14px", border: "1.5px dashed #dde1e9", borderRadius: 3, background: "transparent", cursor: "pointer", fontSize: 12, fontWeight: 600, color: "#6b7280", marginBottom: 10 }}>
            <Icon name="plus" size={13} color="#6b7280" /> Add contract
          </button>
        </div>
      )}

      <input value={notes} onChange={e => setNotes(e.target.value)} placeholder="General notes (salary review due, visa status, etc.)"
        style={{ width: "100%", padding: "7px 10px", border: "1.5px solid #dde1e9", borderRadius: 3, fontSize: 12, outline: "none", fontFamily: "inherit", marginBottom: 10 }} />
      <div style={{ display: "flex", gap: 8 }}>

      </div>
    </div>
  );
}


function ManagementView({ projects, people, deliverables, outputs: allOutputs, salaryAllocations: salaryAllocsProp, onSaveSalary, onLock, onEditProject }) {
  const [mgmtTab, setMgmtTab] = useState("health");
  const today = new Date();

  // ── Health scoring ──
  const scoreProject = (p) => {
    const projDels = deliverables.filter(d => d.project === p.id);
    const overdue = projDels.filter(d => d.deadline && d.status !== "Completed" && new Date(d.deadline) < today).length;
    const notStarted = projDels.filter(d => d.status === "Not Started").length;
    const progress = p.progress || 0;

    // Start at 60 for projects with no recorded activity — they need to earn green
    let score = (progress === 0 && projDels.length === 0) ? 60 : 100;

    // Penalise overdue deliverables heavily
    score -= overdue * 25;
    // Penalise large not-started backlogs
    score -= notStarted > 3 ? 20 : notStarted > 1 ? 10 : 0;
    // Penalise zero progress when deliverables exist
    score -= progress === 0 && projDels.length > 0 ? 25 : 0;
    // Penalise very low progress (under 10%) when deliverables exist
    score -= progress > 0 && progress < 10 && projDels.length > 0 ? 10 : 0;
    // Penalise budgeted projects with very low progress
    score -= p.budget > 0 && progress < 20 ? 15 : 0;
    // No deliverables AND no progress — cap at amber
    if (projDels.length === 0 && progress === 0) score = Math.min(score, 65);

    score = Math.max(0, Math.min(100, score));
    const rag = score >= 70 ? "green" : score >= 40 ? "amber" : "red";
    return { score, rag, overdue, notStarted, progress };
  };

  const RAG = { green: { bg: "#dcfce7", text: "#166534", dot: "#22c55e", label: "On Track" }, amber: { bg: "#fef9c3", text: "#854d0e", dot: "#eab308", label: "At Risk" }, red: { bg: "#fee2e2", text: "#991b1b", dot: "#ef4444", label: "Critical" } };

  // ── Workload ──
  const workload = people.map(p => {
    const assigned = deliverables.filter(d => (d.assignedTeam === p.name || d.teamLead === p.name) && d.status !== "Completed");
    const overdue = assigned.filter(d => d.deadline && new Date(d.deadline) < today);
    const led = projects.filter(pr => getLeads(pr).includes(p.name));
    const load = assigned.length + led.length * 2;
    const level = load === 0 ? "free" : load <= 3 ? "light" : load <= 7 ? "normal" : load <= 12 ? "busy" : "overloaded";
    return { ...p, assigned, overdue, led, load, level };
  }).sort((a, b) => b.load - a.load);

  const LOAD_COLORS = { free: { bg: "#f3f4f6", text: "#9ca3af", label: "Free" }, light: { bg: "#dbeafe", text: "#1d4ed8", label: "Light" }, normal: { bg: "#dcfce7", text: "#166534", label: "Normal" }, busy: { bg: "#fef9c3", text: "#854d0e", label: "Busy" }, overloaded: { bg: "#fee2e2", text: "#991b1b", label: "Overloaded" } };

  // ── Budget ──
  const totalBudget = projects.reduce((s, p) => s + (p.budget || 0), 0);
  const budgetProjects = projects.filter(p => p.budget > 0).sort((a, b) => b.budget - a.budget);

  // ── Deadlines (next 90 days) ──

  const upcoming = deliverables

    .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));

  const salaryAllocations = salaryAllocsProp || {};

  const [emailModal, setEmailModal] = useState(false);

    { id: "deadlines", label: "Deadlines", icon: "calendar" },
    { id: "salary", label: "Salary Allocations", icon: "budget" },
    { id: "peoplereport", label: "People Report", icon: "people" },
